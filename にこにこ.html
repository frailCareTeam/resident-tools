<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>にこにこ｜resident-tools</title>

<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Segoe UI", sans-serif;
    margin: 0;
    padding: 0;
    line-height: 1.7;
    background: #fafafa;
    color: #222;
  }

  /* にこにこ軸カラー（index と同期：グレー） */
  :root {
    --axis-color: #9ca3af;
  }

  header {
    background: var(--axis-color);
    color: #ffffff;
    padding: 1.2rem;
    text-align: center;
    font-size: 1.3rem;
    font-weight: bold;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 1.4rem;
  }

  h2 {
    font-size: 1.3rem;
    margin-top: 2rem;
    border-left: 6px solid var(--axis-color);
    padding-left: 0.6rem;
    font-weight: 600;
  }

  h3 {
    font-size: 1.2rem;
    margin-top: 1.6rem;
    color: var(--axis-color);
  }

  ul {
    padding-left: 1.2rem;
    margin-top: 0.6rem;
  }

  li {
    margin-bottom: 0.6rem;
    color: var(--axis-color);
    font-weight: 600;
  }

  .section-block {
    background: #ffffff;
    padding: 1.2rem;
    border-radius: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.06);
    margin-top: 1.4rem;
  }

  footer {
    text-align: center;
    padding: 2rem 0;
    font-size: 0.85rem;
    color: #777;
  }

  /* ダークモードでも明るい配色を維持 */
  @media (prefers-color-scheme: dark) {
    body {
      background: #fafafa;
      color: #222;
    }

    header {
      background: var(--axis-color);
      color: #fff;
    }

    .section-block {
      background: #ffffff;
      box-shadow: none;
    }

    h2, h3, li {
      color: var(--axis-color);
    }
  }
</style>

</head>

<body>

<header>にこにこ｜resident-tools</header>

<div class="container">

  <h2>2 にこにこ（#＾＾#）</h2>

  <section class="section-block">
    <p>
      研修医が安心して学べる環境は、診療の質に直結します。<br>
      笑顔や穏やかな態度は、研修医だけでなく、他スタッフや患者の緊張も和らげ、質問や相談をしやすい環境となります。<br>
      その積み重ねが、信頼関係を生み、チーム医療の安定と医療安全につながります。<br>
      もし、にこにこしていられない状況があれば、すぐに相談してください。
    </p>
  </section>

</div>

<div id="footer"></div>

<script>
  fetch("footer.html")
    .then(response => response.text())
    .then(data => {
      document.getElementById("footer").innerHTML = data;
    });
</script>

</body>
</html>
